<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>BacAllemand — Apprends l'allemand pour le bac</title>
  <meta name="description" content="Plateforme d'apprentissage de l'allemand pour le baccalauréat algérien." />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" />
  <script>
    // Theme + locale init before paint
    try {
      if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
      var l = localStorage.getItem('locale');
      if (l === 'ar') { document.documentElement.lang = 'ar'; document.documentElement.dir = 'rtl'; }
    } catch(e) {}
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/entry-client.tsx"></script>
</body>
</html>
